services:
  bambulab-metrics-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bambulab-metrics-exporter-test
    restart: "no"
    env_file:
      - .env
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      UMASK: ${UMASK:-002}
      # Set this in shell before up: export BAMBULAB_SECRET_KEY='...'
      BAMBULAB_SECRET_KEY: ${BAMBULAB_SECRET_KEY}
    ports:
      - "9109:9109"
    volumes:
      - ./config:/config/bambulab-metrics-exporter
      # Persist runtime updates back to host .env
      - ./.env:/app/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9109/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
